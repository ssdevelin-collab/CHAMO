{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/home.css' %}">
{% endblock %}

{% block content %}
<main class="main-container">

    <!-- Círculo laranja (posição fixa, igual antes) -->
    <div class="circulo-laranja"></div>

    <!-- Imagem sobre o círculo -->
    <img src="{% static 'fundo_chamo_branco.png' %}" class="imagem-sobre-circulo">

    <!-- Logo -->
    <img src="{% static 'img/logo_chamo-removebg-preview.png' %}" class="logo">

    <!-- Card login alinhado à direita e verticalmente centralizado -->
    <div class="d-flex justify-content-end align-items-center vh-100 p-3">
        <div class="login-card">

            <p class="text-laranja text-center fs-4">
                Conectando quem precisa com quem sabe fazer!
            </p>

            <h2 class="fw-bold text-center mb-4">
                Login
            </h2>

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Email" required>
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Senha" required>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="text-laranja form-check m-0">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label" for="remember">Lembrar-me</label>
                    </div>
                    <a href="#" class="text-laranja text-decoration-none">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn btn-light w-100 text-dark fw-semibold">Entrar</button>

                <p class="mt-3 text-center">
                    <a href="{% url 'accounts:register' %}" class="text-laranja fw-semibold text-decoration-none">Não tem uma conta?</a>
                </p>
            </form>

        </div>
    </div>

</main>
{% endblock %}
