{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
{% endblock %}

{% block content %}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="{% static 'css/home.css' %}">

<main>

    <div class="circulo-laranja"></div>

    <img src="{% static 'img/logo_chamo-removebg-preview.png' %}" class="logo">

    <div class="d-flex justify-content-end align-items-center vh-100 p-3">

        <div class="login-card">

            <p class="text-laranja text-center fs-4">
                Conectando quem precisa com quem sabe fazer!
            </p>

            <h2 class="fw-bold text-center mb-4">
                Login
            </h2>

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="bi bi-person-fill"></i>
                    </span>
                    <input type="text" class="form-control" placeholder="Email">
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="bi bi-lock-fill"></i>
                    </span>
                    <input type="password" class="form-control" placeholder="Senha">
                </div>

                <!-- Linha lembrar + esqueceu -->
                <div class="d-flex justify-content-between align-items-center mb-3">

                    <div class="text-laranja form-check m-0">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label" for="remember">
                            Lembrar-me
                        </label>
                    </div>

                    <a href="#" class="text-laranja text-decoration-none">
                        Esqueceu a senha?
                    </a>

                </div>

                <button class="btn btn-light w-100 text-dark fw-semibold">
                    Entrar
                </button>

                <p class="mt-3 text-center">
                    <a href="{% url 'accounts:register' %}" class="text-laranja fw-semibold text-decoration-none">
                        Não tem uma conta?
                    </a>
                </p>

            </form>

        </div>

    </div>

</main>

{% endblock %}
