{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
{% endblock %}

{% block content %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="{% static 'css/home.css' %}">

<main>
    <div class="d-flex justify-content-center align-items-center vh-100 p-3">
        <div class="login-card">
            <h2 class="fw-bold text-center mb-4">Login</h2>
            <form action="">
                <div class="input-group mb-3">
                    <span class="input-group-text"> <i class="bi bi-person-fill"> </i></span>
                    <input type="text" class="form-control" placeholder="Email">
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text"> <i class="bi bi-lock-fill"> </i></span>
                    <input type="password" class="form-control" placeholder="Senha">
                </div>

                <div class="d-flex justify-content-center align-items-center mb-3">
                    <div>
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label  class="form-check-label">Lembrar-me</label>
                    </div>
                    <a href="" class="text-white small text-decoration-none ms-4">Esqueceu a senha?</a>
                </div>

                <button class="btn btn-ligth w-100 text-dark fw-semibold">Entrar</button>

                <p class="cadastro text-center"> 
                    <a href="" class="text-white fw-semibold text-decoration-none">Não tem uma conta?</a>
                </p>

            </form>
        </div>

    </div>
</main>

{% endblock %}
