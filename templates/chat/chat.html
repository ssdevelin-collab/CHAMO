{% extends 'base.html' %}

{% block chat %}
    {% include 'chat/chat_widget.html' %}
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body">
                <h5>💬 Chat — Pedido #{{ pedido.id }}</h5>
                <p class="text-muted">{{ pedido.servico.nome }}</p>
                <p>O chat está disponível no canto inferior direito da tela. 👇</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        abrirChat({{ conversa.id }}, "{{ pedido.servico.nome }}");
    });
</script>
{% endblock %}
