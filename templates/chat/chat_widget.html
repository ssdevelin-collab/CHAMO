<!-- Botão flutuante de chat (só aparece se houver conversa ativa) -->
<div id="chatBotao" style="display:none; position:fixed; bottom:24px; right:24px; z-index:9999;">
    <button onclick="toggleChat()"
        class="btn btn-success rounded-circle shadow"
        style="width:56px; height:56px; font-size:1.4rem;">
        💬
    </button>
    <span id="chatBadge"
        style="display:none; position:absolute; top:-4px; right:-4px;
               background:red; color:white; border-radius:50%;
               width:20px; height:20px; font-size:11px;
               display:flex; align-items:center; justify-content:center;">
        !
    </span>
</div>
 
<!-- Janela do chat -->
<div id="chatJanela"
    style="display:none; position:fixed; bottom:90px; right:24px; z-index:9999;
           width:340px; height:480px; border-radius:16px; overflow:hidden;
           box-shadow: 0 8px 32px rgba(0,0,0,0.18); flex-direction:column;">
 
    <!-- Cabeçalho -->
    <div class="bg-success text-white d-flex justify-content-between align-items-center px-3 py-2">
        <div>
            <strong>💬 Chat</strong>
            <small id="chatTitulo" class="d-block opacity-75" style="font-size:.75rem;"></small>
        </div>
        <button onclick="toggleChat()" class="btn btn-sm text-white p-0" style="font-size:1.2rem;">✕</button>
    </div>
 
    <!-- Mensagens -->
    <div id="chatMensagens"
        style="flex:1; overflow-y:auto; padding:12px; background:#f8f9fa; display:flex; flex-direction:column; gap:8px;">
    </div>
 
    <!-- Input -->
    <div class="d-flex p-2 bg-white border-top gap-2">
        <input type="text" id="chatInput" class="form-control form-control-sm"
               placeholder="Digite uma mensagem..." autocomplete="off">
        <button onclick="enviarMensagem()" class="btn btn-success btn-sm px-3">➤</button>
    </div>
</div>
 
 
<script>
let chatSocket = null;
let chatAberto = false;
let conversaIdAtual = null;
let usuarioAtualId = {{ request.user.id|default:"null" }};
 
function abrirChat(conversaId, titulo) {
    conversaIdAtual = conversaId;
    document.getElementById('chatTitulo').textContent = titulo || 'Conversa';
    document.getElementById('chatBotao').style.display = 'block';
    document.getElementById('chatJanela').style.display = 'flex';
    chatAberto = true;
    conectarWebSocket(conversaId);
    carregarHistorico(conversaId);
}
 
function toggleChat() {
    const janela = document.getElementById('chatJanela');
    chatAberto = !chatAberto;
    janela.style.display = chatAberto ? 'flex' : 'none';
}
 
function conectarWebSocket(conversaId) {
    if (chatSocket) chatSocket.close();
 
    const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
    chatSocket = new WebSocket(`${protocol}://${window.location.host}/ws/chat/${conversaId}/`);
 
    chatSocket.onmessage = (e) => {
        const data = JSON.parse(e.data);
        adicionarMensagem(data.texto, data.autor_id, data.autor_nome, data.enviada_em);
    };
 
    chatSocket.onclose = () => {
        console.log('WebSocket desconectado.');
    };
}
 
function carregarHistorico(conversaId) {
    fetch(`/chat/historico/${conversaId}/`)
        .then(r => r.json())
        .then(data => {
            document.getElementById('chatMensagens').innerHTML = '';
            data.mensagens.forEach(m => {
                adicionarMensagem(m.texto, m.autor_id, m.autor_nome, m.enviada_em);
            });
        });
}
 
function adicionarMensagem(texto, autorId, autorNome, hora) {
    const container = document.getElementById('chatMensagens');
    const souEu = autorId === usuarioAtualId;
 
    const msg = document.createElement('div');
    msg.style.cssText = `
        max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: .875rem;
        align-self: ${souEu ? 'flex-end' : 'flex-start'};
        background: ${souEu ? '#198754' : '#ffffff'};
        color: ${souEu ? 'white' : '#333'};
        box-shadow: 0 1px 3px rgba(0,0,0,.1);
    `;
    msg.innerHTML = `
        ${!souEu ? `<small style="opacity:.6; font-size:.7rem; display:block;">${autorNome}</small>` : ''}
        ${texto}
        <small style="opacity:.6; font-size:.65rem; display:block; text-align:right; margin-top:2px;">${hora}</small>
    `;
 
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
}
 
function enviarMensagem() {
    const input = document.getElementById('chatInput');
    const texto = input.value.trim();
    if (!texto || !chatSocket) return;
 
    chatSocket.send(JSON.stringify({ texto }));
    input.value = '';
}
 
// Envia com Enter
document.getElementById('chatInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') enviarMensagem();
});
</script>
