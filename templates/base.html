<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>CHAMÔ</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">Logo</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="collapsibleNavbar">
            <ul class="navbar-nav">
              <li class="nav-item"><a class="nav-link" href="#">Link</a></li>
              <li class="nav-item"><a class="nav-link" href="#">Link</a></li>
              <li class="nav-item"><a class="nav-link" href="#">Link</a></li>
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Dropdown</a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">Link</a></li>
                  <li><a class="dropdown-item" href="#">Another link</a></li>
                  <li><a class="dropdown-item" href="#">A third link</a></li>
                </ul>
              </li>
            </ul>
          </div>
        </div>
    </nav>

    <div class="container">
        <span class="navbar-brand">🚀 CHAMÔ</span>

        <form class="d-flex" action="/servicos/buscar/" method="get">
            <input class="form-control me-2" type="text" name="q" placeholder="Buscar serviços ou prestadores">
            <button class="btn btn-success">Buscar</button>
        </form>

        <div>
            {% if user.is_authenticated %}
                <span class="text-dark me-3">Olá, {{ user.username }}</span>
                <a class="btn btn-danger btn-sm" href="/logout/">Sair</a>
            {% else %}
                <a class="btn btn-success btn-sm" href="/login/">Entrar</a>
                <a class="btn btn-primary btn-sm" href="/register/">Cadastro</a>
            {% endif %}
        </div>
    </div>

    <!-- ✅ container-fluid para páginas que precisam de mais largura (ex: mapa) -->
    <div class="container-fluid mt-4 px-4">
        {% block content %}
        {% endblock %}
    </div>

    <!-- ✅ Bloco para JS/CSS extras — ESSENCIAL para o Leaflet funcionar -->
    {% block extra_js %}
    {% endblock %}

</body>
</html>
